name: Auto Fix Issues with Claude

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix-issue:
    if: github.event.label.name == 'easy-bug'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Mark issue in-progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label "in-progress" --remove-label "easy-bug"

      - name: Run Claude Fix Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/fix-issue.js

      - name: Configure git
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"

      - name: Create branch, commit, and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git commit -m "fix: resolve issue #${{ github.event.issue.number }} — ${{ github.event.issue.title }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Fix #${{ github.event.issue.number }}: ${{ github.event.issue.title }}" \
            --body "$(cat <<'EOF'
          ## Auto-generated fix for #${{ github.event.issue.number }}

          **Issue:** ${{ github.event.issue.title }}

          This fix was automatically generated by Claude AI.

          ### What changed
          See the diff for details.

          ### Review checklist
          - [ ] Code changes look correct
          - [ ] No unintended side effects
          - [ ] Ready to merge

          > Closes #${{ github.event.issue.number }}
          EOF
          )" \
            --label "review"

      - name: Label issue for review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label "review" --remove-label "in-progress"
