name: Auto Fix Issues with Claude

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix-issue:
    if: github.event.label.name == 'easy-bug'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix issue → branch → PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Label in-progress
          gh issue edit ${ISSUE_NUMBER} --add-label "in-progress" --remove-label "easy-bug"

          # Run Gemini fix
          node scripts/fix-issue.js

          # Git config + branch + commit + push + PR
          git config user.name "gemini-bot"
          git config user.email "gemini-bot@users.noreply.github.com"

          BRANCH="fix/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git commit -m "fix: resolve issue #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Fix #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "Auto-fix for #${ISSUE_NUMBER} by Gemini AI. Closes #${ISSUE_NUMBER}" \
            --label "review"

          gh issue edit ${ISSUE_NUMBER} --add-label "review" --remove-label "in-progress"
