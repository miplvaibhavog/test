<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap');

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cyan: #00f0ff;
      --cyan-dim: #00f0ff44;
      --magenta: #ff00e5;
      --magenta-dim: #ff00e544;
      --violet: #7b2fff;
      --dark: #05070a;
      --card-bg: rgba(8, 12, 21, 0.75);
      --glass-border: rgba(0, 240, 255, 0.12);
      --text: #c8d6e5;
      --text-bright: #eaf0f6;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    /* ---------- animated background ---------- */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: -50%;
      background:
        radial-gradient(ellipse 600px 600px at 20% 30%, rgba(0, 240, 255, 0.08), transparent),
        radial-gradient(ellipse 500px 500px at 80% 70%, rgba(255, 0, 229, 0.07), transparent),
        radial-gradient(ellipse 400px 400px at 50% 50%, rgba(123, 47, 255, 0.06), transparent);
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(-40px, 30px) scale(1.05); }
      100% { transform: translate(30px, -20px) scale(1); }
    }

    /* grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
    }

    /* floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* ---------- main layout ---------- */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ---------- card ---------- */
    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2.8rem 2.4rem 2.4rem;
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      box-shadow:
        0 0 40px rgba(0, 240, 255, 0.04),
        0 0 80px rgba(123, 47, 255, 0.03),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* top glow line */
    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 10%;
      right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--magenta), transparent);
      border-radius: 2px;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; filter: blur(1px); }
      50%      { opacity: 1;   filter: blur(2px); }
    }

    /* ---------- header ---------- */
    .logo {
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 0.8rem;
      position: relative;
    }

    .logo-icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.5));
    }

    .logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      font-size: 0.82rem;
      color: rgba(200, 214, 229, 0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* ---------- form ---------- */
    .field {
      position: relative;
      margin-bottom: 1.4rem;
    }

    .field-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--cyan);
      opacity: 0.5;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(0, 240, 255, 0.03);
      border: 1px solid rgba(0, 240, 255, 0.1);
      border-radius: 12px;
      color: var(--text-bright);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    }

    .field input::placeholder {
      color: rgba(200, 214, 229, 0.3);
      font-weight: 400;
    }

    .field input:focus {
      border-color: var(--cyan);
      background: rgba(0, 240, 255, 0.06);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.08), inset 0 0 20px rgba(0, 240, 255, 0.03);
    }

    .field input:focus ~ .field-icon {
      opacity: 1;
    }

    /* password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--cyan);
      opacity: 0.4;
      cursor: pointer;
      padding: 4px;
      transition: opacity 0.3s;
    }

    .toggle-pw:hover {
      opacity: 1;
    }

    .toggle-pw svg {
      width: 18px;
      height: 18px;
    }

    /* remember + forgot row */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.6rem;
      font-size: 0.85rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: rgba(200, 214, 229, 0.55);
      transition: color 0.3s;
    }

    .remember:hover {
      color: var(--text);
    }

    .remember input {
      display: none;
    }

    .checkmark {
      width: 18px;
      height: 18px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, background 0.3s;
    }

    .checkmark svg {
      width: 12px;
      height: 12px;
      color: var(--cyan);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .remember input:checked ~ .checkmark {
      border-color: var(--cyan);
      background: rgba(0, 240, 255, 0.1);
    }

    .remember input:checked ~ .checkmark svg {
      opacity: 1;
    }

    .forgot {
      color: var(--cyan);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .forgot:hover {
      opacity: 1;
    }

    /* ---------- button ---------- */
    .btn {
      position: relative;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--violet), var(--magenta));
      background-size: 200% 200%;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.3s;
      animation: gradientMove 4s ease infinite;
    }

    @keyframes gradientMove {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(0, 240, 255, 0.25),
        0 0 60px rgba(123, 47, 255, 0.15);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* spinner */
    .btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ---------- divider ---------- */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 1.6rem 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,240,255,0.15), transparent);
    }

    .divider span {
      font-size: 0.75rem;
      color: rgba(200, 214, 229, 0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ---------- socials ---------- */
    .socials {
      display: flex;
      gap: 12px;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(0, 240, 255, 0.08);
      border-radius: 12px;
      background: rgba(0, 240, 255, 0.02);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s, transform 0.2s;
    }

    .social-btn:hover {
      border-color: rgba(0, 240, 255, 0.25);
      background: rgba(0, 240, 255, 0.06);
      transform: translateY(-1px);
    }

    .social-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ---------- footer ---------- */
    .footer {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.85rem;
      color: rgba(200, 214, 229, 0.4);
    }

    .footer a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.3s;
    }

    .footer a:hover {
      opacity: 0.8;
    }

    /* scanline effect */
    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.015) 2px,
        rgba(0, 0, 0, 0.015) 4px
      );
    }

    /* responsive */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.4rem 1.8rem;
        border-radius: 16px;
      }
      .logo h1 {
        font-size: 1.1rem;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg"></div>
  <div class="grid-overlay"></div>
  <div class="particles" id="particles"></div>
  <div class="scanline"></div>

  <!-- Card -->
  <div class="wrapper">
    <div class="card">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M26 4L46 16v20L26 48 6 36V16L26 4z" stroke="url(#g1)" stroke-width="1.5" fill="none"/>
            <path d="M26 12L40 20v16L26 44 12 36V20L26 12z" stroke="url(#g2)" stroke-width="1" fill="none" opacity="0.5"/>
            <circle cx="26" cy="26" r="6" fill="url(#g3)" opacity="0.8"/>
            <circle cx="26" cy="26" r="3" fill="#00f0ff"/>
            <defs>
              <linearGradient id="g1" x1="6" y1="4" x2="46" y2="48"><stop stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
              <linearGradient id="g2" x1="12" y1="12" x2="40" y2="44"><stop stop-color="#00f0ff" stop-opacity="0.5"/><stop offset="1" stop-color="#7b2fff" stop-opacity="0.5"/></linearGradient>
              <radialGradient id="g3" cx="26" cy="26" r="6"><stop stop-color="#00f0ff" stop-opacity="0.4"/><stop offset="1" stop-color="#7b2fff" stop-opacity="0.1"/></radialGradient>
            </defs>
          </svg>
        </div>
        <h1>Nexus</h1>
      </div>
      <p class="subtitle">Secure Access Portal</p>

      <!-- Form -->
      <form id="loginForm" autocomplete="off">
        <!-- Email -->
        <div class="field">
          <input type="email" id="email" placeholder="Email address" required />
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <path d="M22 7l-10 6L2 7"/>
          </svg>
        </div>

        <!-- Password -->
        <div class="field">
          <input type="password" id="password" placeholder="Password" required />
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="3"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <!-- Meta row -->
        <div class="meta-row">
          <label class="remember">
            <input type="checkbox" />
            <span class="checkmark">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
            </span>
            Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>
      </form>

      <!-- Divider -->
      <div class="divider"><span>or continue with</span></div>

      <!-- Social buttons -->
      <div class="socials">
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
      </div>

      <!-- Footer -->
      <p class="footer">Don't have an account? <a href="#">Create one</a></p>
    </div>
  </div>

  <script>
    // Floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = 6 + Math.random() * 10 + 's';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
      if (Math.random() > 0.7) p.style.background = '#ff00e5';
      if (Math.random() > 0.9) p.style.background = '#7b2fff';
      container.appendChild(p);
    }

    // Toggle password visibility
    const toggleBtn = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
      const isPassword = pwInput.type === 'password';
      pwInput.type = isPassword ? 'text' : 'password';
      toggleBtn.innerHTML = isPassword
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
    });

    // Form submit with loading animation
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn');
      btn.classList.add('loading');
      setTimeout(() => {
        btn.classList.remove('loading');
        alert('Login successful!');
      }, 2000);
    });
  </script>
</body>
</html>
