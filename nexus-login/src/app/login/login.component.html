<!-- Background -->
<div class="bg"></div>
<div class="grid-overlay"></div>
<div class="particles">
  <div
    *ngFor="let p of particles"
    class="particle"
    [style.left]="p.left"
    [style.animationDuration]="p.duration"
    [style.animationDelay]="p.delay"
    [style.width]="p.size"
    [style.height]="p.size"
    [style.background]="p.color"
  ></div>
</div>
<div class="scanline"></div>

<!-- Card -->
<div class="wrapper">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M26 4L46 16v20L26 48 6 36V16L26 4z" stroke="url(#g1)" stroke-width="1.5" fill="none"/>
          <path d="M26 12L40 20v16L26 44 12 36V20L26 12z" stroke="url(#g2)" stroke-width="1" fill="none" opacity="0.5"/>
          <circle cx="26" cy="26" r="6" fill="url(#g3)" opacity="0.8"/>
          <circle cx="26" cy="26" r="3" fill="#00f0ff"/>
          <defs>
            <linearGradient id="g1" x1="6" y1="4" x2="46" y2="48"><stop stop-color="#00f0ff"/><stop offset="1" stop-color="#ff00e5"/></linearGradient>
            <linearGradient id="g2" x1="12" y1="12" x2="40" y2="44"><stop stop-color="#00f0ff" stop-opacity="0.5"/><stop offset="1" stop-color="#7b2fff" stop-opacity="0.5"/></linearGradient>
            <radialGradient id="g3" cx="26" cy="26" r="6"><stop stop-color="#00f0ff" stop-opacity="0.4"/><stop offset="1" stop-color="#7b2fff" stop-opacity="0.1"/></radialGradient>
          </defs>
        </svg>
      </div>
      <h1>Nexus</h1>
    </div>
    <p class="subtitle">Secure Access Portal</p>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" autocomplete="off">
      <!-- Email -->
      <div class="field">
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Email address"
          required
        />
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="3"/>
          <path d="M22 7l-10 6L2 7"/>
        </svg>
      </div>

      <!-- Password -->
      <div class="field">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          required
        />
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="3"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <button type="button" class="toggle-pw" (click)="togglePassword()" aria-label="Toggle password visibility">
          <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Meta row -->
      <div class="meta-row">
        <label class="remember">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span class="checkmark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
          </span>
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn" [class.loading]="isLoading">
        <span class="btn-text">Sign In</span>
        <span class="spinner"></span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider"><span>or continue with</span></div>

    <!-- Social buttons -->
    <div class="socials">
      <button class="social-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="social-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </button>
    </div>

    <!-- Footer -->
    <p class="footer">Don't have an account? <a href="#">Create one</a></p>
  </div>
</div>
